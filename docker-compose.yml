version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./apps/api
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    ports:
      - "3001:3001"

  web:
    build: ./apps/web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"

volumes:
  db-data: {}
